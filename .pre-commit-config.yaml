# Pre-commit hooks for the dd-research pipeline.
#
# Install once per clone:
#     uv run pre-commit install
#
# Mirrors CI exactly (.github/workflows/ci.yml): strict `ruff check` +
# `ruff format --check` against both pipeline/ and scripts/, then pytest
# against pipeline/. No auto-fix — if the hook complains, run
# `uv run ruff check --fix pipeline/ scripts/` and
# `uv run ruff format pipeline/ scripts/` manually before retrying the commit.

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (pipeline/ scripts/)
        entry: uv run ruff check pipeline/ scripts/
        language: system
        pass_filenames: false
        files: ^(pipeline|scripts)/
        stages: [pre-commit]

      - id: ruff-format-check
        name: ruff format --check (pipeline/ scripts/)
        entry: uv run ruff format --check pipeline/ scripts/
        language: system
        pass_filenames: false
        files: ^(pipeline|scripts)/
        stages: [pre-commit]

      - id: pytest
        name: pytest (pipeline/)
        entry: uv run pytest pipeline/ -x -q
        language: system
        pass_filenames: false
        files: ^pipeline/
        stages: [pre-commit]
