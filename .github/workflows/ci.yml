name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies (locked)
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check pipeline/ scripts/

      - name: Format check (ruff)
        run: uv run ruff format --check pipeline/ scripts/

      - name: Test (pytest)
        run: uv run pytest pipeline/
